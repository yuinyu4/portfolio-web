<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — EK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500&family=Fira+Code:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080808; --bg1: #0f0f0f; --bg2: #141414;
  --text: #f0ede8; --sub: #5a5856;
  --accent: #b8ff57; --accent-dim: rgba(184,255,87,0.1);
  --border: rgba(255,255,255,0.06); --border-h: rgba(184,255,87,0.22);
  --danger: #ff4444; --danger-dim: rgba(255,68,68,0.1);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; font-weight: 300; min-height: 100vh; }

/* LOGIN */
#login {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
.login-card {
  width: 380px; border: 1px solid var(--border);
  background: var(--bg1); padding: 3rem;
}
.login-eyebrow {
  font-family: 'Fira Code', monospace; font-size: 0.62rem;
  color: var(--accent); letter-spacing: 0.2em; margin-bottom: 0.5rem; display: flex; gap: 0.5rem;
}
.login-eyebrow::before { content: '//'; color: var(--sub); }
.login-title {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: 1.8rem; letter-spacing: -0.04em; color: var(--text);
  margin-bottom: 2.5rem;
}
label {
  font-family: 'Fira Code', monospace; font-size: 0.6rem;
  color: var(--sub); letter-spacing: 0.15em; display: block; margin-bottom: 0.5rem;
}
input[type=text], input[type=password], input[type=url], input[type=date], textarea, select {
  width: 100%; background: var(--bg2); border: 1px solid var(--border);
  color: var(--text); padding: 0.75rem 1rem;
  font-family: 'Outfit', sans-serif; font-size: 0.85rem; font-weight: 300;
  outline: none; transition: border-color 0.2s; margin-bottom: 1.2rem;
  -webkit-appearance: none;
}
input:focus, textarea:focus, select:focus { border-color: var(--border-h); }
textarea { min-height: 100px; resize: vertical; }
input[type=file] { background: none; border: none; padding: 0; color: var(--sub); font-size: 0.8rem; margin-bottom: 0.8rem; }
.btn {
  background: none; border: 1px solid var(--border);
  color: var(--sub); padding: 0.75rem 1.5rem;
  font-family: 'Fira Code', monospace; font-size: 0.62rem;
  letter-spacing: 0.12em; cursor: pointer; transition: all 0.2s; width: 100%;
  position: relative; overflow: hidden;
}
.btn::before { content: ''; position: absolute; inset: 0; background: var(--accent-dim); transform: translateX(-100%); transition: transform 0.3s; }
.btn:hover { color: var(--accent); border-color: var(--border-h); }
.btn:hover::before { transform: translateX(0); }
.btn span { position: relative; }
.btn-sm { padding: 0.4rem 0.8rem; font-size: 0.55rem; width: auto; }
.btn-danger { border-color: rgba(255,68,68,0.2); color: #884; }
.btn-danger:hover { color: var(--danger); border-color: rgba(255,68,68,0.4); }
.btn-danger::before { background: var(--danger-dim); }
.err { font-family: 'Fira Code', monospace; font-size: 0.62rem; color: var(--danger); margin-top: -0.8rem; margin-bottom: 1rem; }

/* ADMIN LAYOUT */
#admin { display: none; }
.admin-top {
  position: sticky; top: 0; z-index: 100;
  background: rgba(8,8,8,0.9); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2.5rem;
}
.admin-logo {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: 0.9rem; letter-spacing: -0.02em; color: var(--accent);
  padding: 1.2rem 0;
}
.tabs { display: flex; }
.tab {
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--sub); padding: 1.2rem 1.2rem;
  font-family: 'Fira Code', monospace; font-size: 0.62rem;
  letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s;
}
.tab:hover { color: var(--text); }
.tab.on { color: var(--accent); border-bottom-color: var(--accent); }
.logout-btn {
  background: none; border: 1px solid var(--border);
  color: var(--sub); padding: 0.4rem 0.9rem;
  font-family: 'Fira Code', monospace; font-size: 0.55rem;
  letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s;
}
.logout-btn:hover { color: var(--danger); border-color: rgba(255,68,68,0.3); }

.admin-wrap { max-width: 860px; margin: 0 auto; padding: 3rem 2rem; }
.panel { display: none; }
.panel.on { display: block; }

.panel-hd {
  font-family: 'Fira Code', monospace; font-size: 0.62rem;
  color: var(--accent); letter-spacing: 0.2em;
  margin-bottom: 2rem; display: flex; align-items: center; gap: 1rem;
}
.panel-hd::before { content: '//'; color: var(--sub); }
.panel-hd::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.form-box { border: 1px solid var(--border); background: var(--bg1); padding: 2rem; margin-bottom: 2rem; }
.form-box-label {
  font-family: 'Fira Code', monospace; font-size: 0.58rem;
  color: var(--sub); letter-spacing: 0.12em; margin-bottom: 1.5rem; display: block;
}
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

.item {
  display: flex; justify-content: space-between; align-items: center;
  border: 1px solid var(--border); background: var(--bg1);
  padding: 1.2rem 1.5rem; margin-bottom: 1px; gap: 1rem;
  transition: background 0.15s;
}
.item:hover { background: var(--bg2); }
.item-l { flex: 1; min-width: 0; }
.item-name { font-size: 0.88rem; color: var(--text); margin-bottom: 0.2rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.item-sub { font-family: 'Fira Code', monospace; font-size: 0.6rem; color: var(--sub); }
.item-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
.item-thumb { width: 72px; height: 52px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; }

.preview-img { width: 100%; max-height: 180px; object-fit: cover; display: none; margin-bottom: 1rem; border: 1px solid var(--border); }

.range-wrap { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.2rem; }
input[type=range] { flex: 1; accent-color: var(--accent); }
.range-val { font-family: 'Fira Code', monospace; font-size: 0.7rem; color: var(--accent); min-width: 32px; text-align: right; }

.divider { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
.back { display: inline-block; color: var(--sub); text-decoration: none; font-family: 'Fira Code', monospace; font-size: 0.62rem; letter-spacing: 0.1em; border: 1px solid var(--border); padding: 0.5rem 1rem; transition: all 0.2s; }
.back:hover { color: var(--accent); border-color: var(--border-h); }

/* TOAST */
.toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
  background: var(--bg2); border: 1px solid var(--border-h);
  color: var(--accent); padding: 0.7rem 1.4rem;
  font-family: 'Fira Code', monospace; font-size: 0.62rem; letter-spacing: 0.1em;
  opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap;
}
.toast.show { opacity: 1; }

.empty-msg { font-family: 'Fira Code', monospace; font-size: 0.65rem; color: var(--sub); padding: 1.5rem 0; letter-spacing: 0.08em; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="login-eyebrow">admin access</div>
    <div class="login-title">EK Panel</div>
    <label>Password</label>
    <input type="password" id="pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
    <div class="err" id="login-err" style="display:none">// incorrect password</div>
    <button class="btn" onclick="login()"><span>Enter →</span></button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin">
  <div class="admin-top">
    <div class="admin-logo">EK / Admin</div>
    <div class="tabs">
      <button class="tab on" onclick="switchTab('about',this)">about</button>
      <button class="tab" onclick="switchTab('projects',this)">projects</button>
      <button class="tab" onclick="switchTab('skills',this)">skills</button>
      <button class="tab" onclick="switchTab('gallery',this)">gallery</button>
      <button class="tab" onclick="switchTab('config',this)">config</button>
    </div>
    <button class="logout-btn" onclick="logout()">logout</button>
  </div>

  <div class="admin-wrap">

    <!-- ABOUT -->
    <div class="panel on" id="panel-about">
      <div class="panel-hd">about me</div>
      <div class="form-box">
        <span class="form-box-label">// bio text — one paragraph per line</span>
        <label>Self Introduction</label>
        <textarea id="about-text" placeholder="I'm a high school student in Korea..."></textarea>
        <button class="btn" onclick="saveAbout()"><span>Save About →</span></button>
      </div>
    </div>

    <!-- PROJECTS -->
    <div class="panel" id="panel-projects">
      <div class="panel-hd">add project</div>
      <div class="form-box">
        <label>Project Name</label>
        <input type="text" id="pj-name" placeholder="Emergency Medical System">
        <label>Description</label>
        <textarea id="pj-desc" placeholder="What did you build?" style="min-height:80px"></textarea>
        <label>Tags (comma separated)</label>
        <input type="text" id="pj-tags" placeholder="PHP, MySQL, API">
        <label>GitHub / Link (optional)</label>
        <input type="url" id="pj-link" placeholder="https://github.com/...">
        <button class="btn" onclick="addProject()"><span>Add Project →</span></button>
      </div>
      <div class="panel-hd">existing</div>
      <div id="pj-list"></div>
    </div>

    <!-- SKILLS -->
    <div class="panel" id="panel-skills">
      <div class="panel-hd">add skill</div>
      <div class="form-box">
        <div class="row2">
          <div>
            <label>Language / Framework</label>
            <input type="text" id="sk-name" placeholder="Python">
          </div>
          <div>
            <label>Level Label</label>
            <input type="text" id="sk-label" placeholder="Intermediate">
          </div>
        </div>
        <label>Proficiency</label>
        <div class="range-wrap">
          <input type="range" min="0" max="100" value="65" id="sk-level" oninput="document.getElementById('sk-val').textContent=this.value+'%'">
          <span class="range-val" id="sk-val">65%</span>
        </div>
        <button class="btn" onclick="addSkill()"><span>Add Skill →</span></button>
      </div>
      <div class="panel-hd">existing</div>
      <div id="sk-list"></div>
    </div>

    <!-- GALLERY -->
    <div class="panel" id="panel-gallery">
      <div class="panel-hd">add photo</div>
      <div class="form-box">
        <label>Upload Image</label>
        <input type="file" id="ph-file" accept="image/*" onchange="previewPh(this)">
        <img id="ph-preview" class="preview-img" alt="preview">
        <div class="row2">
          <div>
            <label>Location</label>
            <input type="text" id="ph-loc" placeholder="Seoul, Korea">
          </div>
          <div>
            <label>Date</label>
            <input type="date" id="ph-date">
          </div>
        </div>
        <button class="btn" onclick="addPhoto()"><span>Add Photo →</span></button>
      </div>
      <div class="panel-hd">library</div>
      <div id="ph-list"></div>
    </div>

    <!-- CONFIG -->
    <div class="panel" id="panel-config">
      <div class="panel-hd">social links</div>
      <div class="form-box">
        <label>GitHub URL</label>
        <input type="url" id="cfg-gh" placeholder="https://github.com/username">
        <label>Instagram URL</label>
        <input type="url" id="cfg-ig" placeholder="https://instagram.com/username">
        <button class="btn" onclick="saveConfig()"><span>Save Config →</span></button>
      </div>
      <div class="panel-hd">security</div>
      <div class="form-box">
        <label>New Password</label>
        <input type="password" id="new-pw" placeholder="New password">
        <label>Confirm</label>
        <input type="password" id="cfm-pw" placeholder="Confirm">
        <button class="btn btn-danger" onclick="changePw()"><span>Change Password →</span></button>
      </div>
      <hr class="divider">
      <a href="index.html" class="back">← view portfolio</a>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DEF_PW = 'admin123';
function getPw(){ return localStorage.getItem('admin_pw') || DEF_PW; }
function login(){
  if(document.getElementById('pw').value === getPw()){
    document.getElementById('login').style.display='none';
    document.getElementById('admin').style.display='block';
    loadAll();
  } else { document.getElementById('login-err').style.display='block'; }
}
function logout(){
  document.getElementById('admin').style.display='none';
  document.getElementById('login').style.display='flex';
  document.getElementById('pw').value='';
}
function changePw(){
  const a=document.getElementById('new-pw').value, b=document.getElementById('cfm-pw').value;
  if(!a) return toast('// enter new password');
  if(a!==b) return toast('// passwords do not match');
  localStorage.setItem('admin_pw',a);
  document.getElementById('new-pw').value=''; document.getElementById('cfm-pw').value='';
  toast('// password changed');
}

function load(k,d){ try{const v=localStorage.getItem(k); return v?JSON.parse(v):d;}catch{return d;} }
function save(k,v){ localStorage.setItem(k,JSON.stringify(v)); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); }

function switchTab(name, btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('panel-'+name).classList.add('on');
  btn.classList.add('on');
}

// ABOUT
function loadAbout(){ const cfg=load('config',{}); if(cfg.aboutText) document.getElementById('about-text').value=cfg.aboutText; }
function saveAbout(){ const cfg=load('config',{}); cfg.aboutText=document.getElementById('about-text').value; save('config',cfg); toast('// about saved'); }

// PROJECTS
const PJ_DEF=[
  {name:'Emergency Medical System',desc:'Ambulance-hospital matching platform — PHP + MySQL backend to reduce transport time and boost survival rates.',tags:['PHP','MySQL','Database','API'],link:''},
  {name:'High School Timetable App',desc:'Practical scheduling app for daily student use.',tags:['App Inventor','PHP','SQL'],link:''},
  {name:'Secure Data Encryption',desc:'AES_ENCRYPT + HEX-based pipeline for sensitive field encryption.',tags:['PHP','MySQL','Security'],link:''},
];
function renderProjects(){
  const list=load('projects',PJ_DEF);
  const el=document.getElementById('pj-list');
  if(!list.length){el.innerHTML='<div class="empty-msg">// no projects yet</div>';return;}
  el.innerHTML=list.map((p,i)=>`
    <div class="item">
      <div class="item-l">
        <div class="item-name">${p.name}</div>
        <div class="item-sub">${p.tags.join(' · ')}</div>
      </div>
      <div class="item-actions"><button class="btn btn-danger btn-sm" onclick="delProject(${i})"><span>delete</span></button></div>
    </div>
  `).join('');
}
function addProject(){
  const name=document.getElementById('pj-name').value.trim();
  if(!name) return toast('// enter project name');
  const list=load('projects',PJ_DEF);
  list.unshift({name,desc:document.getElementById('pj-desc').value.trim(),tags:document.getElementById('pj-tags').value.split(',').map(t=>t.trim()).filter(Boolean),link:document.getElementById('pj-link').value.trim()});
  save('projects',list);
  ['pj-name','pj-desc','pj-tags','pj-link'].forEach(id=>document.getElementById(id).value='');
  renderProjects(); toast('// project added');
}
function delProject(i){ if(!confirm('Delete?')) return; const list=load('projects',PJ_DEF); list.splice(i,1); save('projects',list); renderProjects(); toast('// deleted'); }

// SKILLS
const SK_DEF=[{name:'Python',level:65,label:'Intermediate'},{name:'C',level:55,label:'Intermediate'},{name:'SQL',level:70,label:'Intermediate'},{name:'PHP',level:60,label:'Intermediate'}];
function renderSkills(){
  const list=load('skills',SK_DEF);
  const el=document.getElementById('sk-list');
  if(!list.length){el.innerHTML='<div class="empty-msg">// no skills yet</div>';return;}
  el.innerHTML=list.map((s,i)=>`
    <div class="item">
      <div class="item-l"><div class="item-name">${s.name}</div><div class="item-sub">${s.label} — ${s.level}%</div></div>
      <div class="item-actions"><button class="btn btn-danger btn-sm" onclick="delSkill(${i})"><span>delete</span></button></div>
    </div>
  `).join('');
}
function addSkill(){
  const name=document.getElementById('sk-name').value.trim();
  if(!name) return toast('// enter skill name');
  const list=load('skills',SK_DEF);
  list.push({name,level:parseInt(document.getElementById('sk-level').value),label:document.getElementById('sk-label').value.trim()||'Intermediate'});
  save('skills',list);
  document.getElementById('sk-name').value=''; document.getElementById('sk-label').value='';
  document.getElementById('sk-level').value=65; document.getElementById('sk-val').textContent='65%';
  renderSkills(); toast('// skill added');
}
function delSkill(i){ if(!confirm('Delete?')) return; const list=load('skills',SK_DEF); list.splice(i,1); save('skills',list); renderSkills(); toast('// deleted'); }

// GALLERY
let pDataURL=null;
function previewPh(input){ const f=input.files[0]; if(!f) return; const r=new FileReader(); r.onload=e=>{ pDataURL=e.target.result; const p=document.getElementById('ph-preview'); p.src=pDataURL; p.style.display='block'; }; r.readAsDataURL(f); }
function renderPhotos(){
  const list=load('photos',[]);
  const el=document.getElementById('ph-list');
  if(!list.length){el.innerHTML='<div class="empty-msg">// no photos yet</div>';return;}
  el.innerHTML=list.map((p,i)=>`
    <div class="item">
      <img src="${p.src}" class="item-thumb" alt="">
      <div class="item-l"><div class="item-name">${p.location}</div><div class="item-sub">${p.date}</div></div>
      <div class="item-actions"><button class="btn btn-danger btn-sm" onclick="delPhoto(${i})"><span>delete</span></button></div>
    </div>
  `).join('');
}
function addPhoto(){
  if(!pDataURL) return toast('// select an image');
  const loc=document.getElementById('ph-loc').value.trim();
  const date=document.getElementById('ph-date').value;
  if(!loc) return toast('// enter location');
  if(!date) return toast('// enter date');
  const list=load('photos',[]);
  list.push({src:pDataURL,location:loc,date});
  save('photos',list);
  pDataURL=null; document.getElementById('ph-preview').style.display='none';
  document.getElementById('ph-file').value='';
  document.getElementById('ph-loc').value=''; document.getElementById('ph-date').value='';
  renderPhotos(); toast('// photo added');
}
function delPhoto(i){ if(!confirm('Delete?')) return; const list=load('photos',[]); list.splice(i,1); save('photos',list); renderPhotos(); toast('// deleted'); }

// CONFIG
function loadConfig(){ const cfg=load('config',{}); if(cfg.github) document.getElementById('cfg-gh').value=cfg.github; if(cfg.instagram) document.getElementById('cfg-ig').value=cfg.instagram; }
function saveConfig(){ const cfg=load('config',{}); cfg.github=document.getElementById('cfg-gh').value.trim(); cfg.instagram=document.getElementById('cfg-ig').value.trim(); save('config',cfg); toast('// config saved'); }

function loadAll(){ loadAbout(); loadConfig(); renderProjects(); renderSkills(); renderPhotos(); }
document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') login(); });
</script>
</body>
</html>
